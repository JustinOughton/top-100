name: Option C Market Cloud Engine

on:
  schedule:
    - cron: '0 14-21 * * 1-5'
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

jobs:
  run-market-engine:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v3

    - name: Set up Cloud Python Environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Data Libraries
      run: pip install pandas yfinance numpy requests

    - name: Force Initial Setup Run
      run: |
        python script.py --rebalance
        python script.py

    - name: Save and Commit Updated Outputs
      run: |
        git config --global user.name "Option-C-Cloud-Bot"
        git config --global user.email "bot@optionc.internal"
        
        # This line forces a blank placeholder dashboard if it's missing on weekends
        if [ ! -f market_dashboard.html ]; then echo "<h1>Option C Market Closed - Standby for Monday Open</h1>" > market_dashboard.html; fi
        
        git add -A
        git commit -m "Automated Sync: Initialization run complete" || true
        git push || true
