name: Option C Market Cloud Engine

on:
  schedule:
    - cron: '0 14-21 * * 1-5'
    - cron: '30 19 * * 1-5'
  workflow_dispatch:
    inputs:
      force_sync:
        description: 'Set to true to force populate the historical memory JSON cache file'
        required: false
        default: 'false'

jobs:
  run-market-engine:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Cloud Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Data Libraries
      run: pip install pandas yfinance numpy requests

    # Conditional Gate: If you toggle 'force_sync' to true, run the standalone history collector
    - name: Force Historical Cache Sync
      if: ${{ github.event.inputs.force_sync == 'true' }}
      run: python force_cache_sync.py

    # Standard loop tasking runs if force_sync is left as false
    - name: Force Universe Rebalance Setup
      if: ${{ github.event.inputs.force_sync != 'true' }}
      run: python script.py --rebalance

    - name: Run Matrix Update
      if: ${{ github.event.inputs.force_sync != 'true' }}
      run: python script.py

    - name: Save and Commit Updated Outputs
      run: |
        git config --global user.name "Option-C-Cloud-Bot"
        git config --global user.email "bot@optionc.internal"
        
        git pull origin main --rebase || true
        
        git add market_state_memory.json || true
        git add active_100_tickers.csv || true
        git add current_ai_rankings.csv || true
        git add index.html || true
        git add daily_market_close_report.txt || true
        
        git commit -m "Automated Sync Update" || true
        git push origin main || true
