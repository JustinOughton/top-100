name: Option C Market Cloud Engine

on:
  schedule:
    - cron: '0 14-21 * * 1-5'
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

jobs:
  run-market-engine:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Cloud Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Data Libraries
      run: pip install pandas yfinance numpy requests

    # Task 1: Clean and update the underlying text report & active ticker pool
    - name: Force Universe Rebalance Setup
      run: python script.py --rebalance

    # Task 2: Build fresh HTML dashboards and rank matrices 
    - name: Run Matrix Update
      run: python script.py

    # Task 3: Permanently write all new and replaced files back to your GitHub files tab
    - name: Save and Commit Updated Outputs
      run: |
        git config --global user.name "Option-C-Cloud-Bot"
        git config --global user.email "bot@optionc.internal"
        
        # Pull any changes to stay in sync safely
        git pull origin main --rebase || true
        
        # Guards added to prevent crash if data fails to generate on a specific run
        git add active_100_tickers.csv || true
        git add current_ai_rankings.csv || true
        git add index.html || true
        git add daily_market_close_report.txt || true
        
        # Commit and push changes back into your repository
        git commit -m "Automated Sync: Matrix, Dashboard, and Close Report live" || true
        git push origin main || true
